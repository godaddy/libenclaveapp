# Publishes the `enclave` crate to crates.io on version tag push.
# CARGO_REGISTRY_TOKEN must be set in GitHub repo secrets before this workflow
# will succeed. Generate a token at https://crates.io/settings/tokens and add
# it as a repository secret named CARGO_REGISTRY_TOKEN.

name: Publish

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check / Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            features: "--features enclaveapp-apple/signing,enclaveapp-apple/encryption,enclaveapp-keyring/signing,enclaveapp-keyring/encryption"
          - name: Windows
            os: windows-latest
            features: "--features enclaveapp-windows/signing,enclaveapp-windows/encryption,enclaveapp-keyring/signing,enclaveapp-keyring/encryption"
          - name: Linux
            os: ubuntu-latest
            features: "--features enclaveapp-linux-tpm/signing,enclaveapp-linux-tpm/encryption,enclaveapp-keyring/signing,enclaveapp-keyring/encryption"
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config libtss2-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets ${{ matrix.features }} -- -D warnings
      - name: Build
        run: cargo build --workspace ${{ matrix.features }}
      - name: Test
        run: cargo test --workspace ${{ matrix.features }}

  publish:
    name: Publish to crates.io
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config libtss2-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}
      - name: Publish enclave crate
        run: cargo publish -p enclave --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
