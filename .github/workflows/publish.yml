# Publishes the `hardware-enclave` crate to crates.io on version tag push.
# CARGO_REGISTRY_TOKEN must be set in GitHub repo secrets before this workflow
# will succeed. Generate a token at https://crates.io/settings/tokens and add
# it as a repository secret named CARGO_REGISTRY_TOKEN.
#
# To release: bump `version` in the workspace Cargo.toml, commit, merge to
# main, then:
#
#   git tag v<version>
#   git push origin v<version>

name: Publish

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check / Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: macOS
            os: macos-latest
            features: "--features signing,encryption,mock"
          - name: Windows
            os: windows-latest
            features: "--features signing,encryption,mock"
          - name: Linux
            os: ubuntu-latest
            features: "--features signing,encryption,linux-tpm,mock"
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config libtss2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --package hardware-enclave --all-targets ${{ matrix.features }} -- -D warnings

      - name: Build
        run: cargo build --package hardware-enclave ${{ matrix.features }}

      - name: Test
        run: cargo test --package hardware-enclave ${{ matrix.features }}

  publish:
    name: Publish to crates.io
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config libtss2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}

      - name: Publish hardware-enclave crate
        run: cargo publish -p hardware-enclave --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
