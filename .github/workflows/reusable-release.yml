name: Reusable Release

on:
  workflow_call:
    inputs:
      app_name:
        description: 'Application name (e.g., "sshenc")'
        required: true
        type: string
      targets:
        description: 'JSON array of build targets'
        required: false
        default: '["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-pc-windows-msvc", "x86_64-unknown-linux-gnu"]'
        type: string
      unix_binaries:
        description: 'Space-separated Unix binaries to package'
        required: true
        type: string
      windows_binaries:
        description: 'Space-separated Windows .exe to package'
        required: true
        type: string
      cargo_build_args:
        description: 'Extra cargo args for clippy/build/test'
        required: false
        default: ''
        type: string
      test_args:
        description: 'Extra args appended after -- to cargo test (e.g., --test-threads=1)'
        required: false
        default: ''
        type: string
      linux_deps:
        description: 'apt packages for Linux builds'
        required: false
        default: ''
        type: string
      wix_file:
        description: 'WiX .wxs path for MSI. Empty to skip.'
        required: false
        default: ''
        type: string
      extra_packaging:
        description: 'JSON: {"unix_libs":"","windows_dlls":""}'
        required: false
        default: '{}'
        type: string
      homebrew:
        description: 'JSON: {"tap_repo":"","formula_class":"","description":""}. Empty to skip.'
        required: false
        default: ''
        type: string
      scoop:
        description: 'JSON: {"bucket_repo":"","description":"","has_winget":false}. Empty to skip.'
        required: false
        default: ''
        type: string
      macos_signing_identity:
        description: 'macOS code-signing identity name, e.g. "Developer ID Application: Foo Bar (TEAMID)". When set with the matching MACOS_SIGNING_* and NOTARIZATION_* secrets, macOS binaries are codesigned (hardened runtime + secure timestamp) and notarized via Apple''s notary service. Empty to skip.'
        required: false
        default: ''
        type: string
      macos_entitlements_plist:
        description: 'Path (relative to the consuming repo root) to an entitlements .plist file passed to codesign as `--entitlements`. Required when the consuming binaries need entitlements such as `keychain-access-groups` to access the Data Protection keychain. Empty to sign without entitlements.'
        required: false
        default: ''
        type: string
      macos_bundle_id:
        description: 'CFBundleIdentifier for the macOS .app bundle, e.g. `com.godaddy.sshenc`. When set with `MACOS_PROVISIONING_PROFILE`, macOS binaries are staged into `<app_name>.app/Contents/MacOS/` and the bundle (with embedded provisioning profile) is signed + notarized as a unit. When empty (default), binaries ship as a flat tarball — the pre-bundling behaviour. See `docs/macos-app-bundle-distribution.md`.'
        required: false
        default: ''
        type: string
      macos_binaries:
        description: 'Space-separated list of binaries to include in the macOS tarball / .app bundle. Empty defaults to `unix_binaries` (the all-Unix list). Use to drop platform-specific binaries that don''t belong on macOS, e.g. tpm-bridge stdio servers used only by WSL.'
        required: false
        default: ''
        type: string
    secrets:
      HOMEBREW_TAP_TOKEN:
        required: false
      SCOOP_BUCKET_TOKEN:
        required: false
      MACOS_SIGNING_CERTIFICATE_P12:
        description: 'Base64-encoded .p12 holding the Developer ID Application cert + private key. Required when macos_signing_identity is set.'
        required: false
      MACOS_SIGNING_CERTIFICATE_PASSWORD:
        description: 'Passphrase for MACOS_SIGNING_CERTIFICATE_P12. Required when macos_signing_identity is set.'
        required: false
      NOTARIZATION_API_KEY:
        description: 'Base64-encoded App Store Connect API key (.p8). Required when macos_signing_identity is set.'
        required: false
      NOTARIZATION_KEY_ID:
        description: 'App Store Connect API Key ID (10-char). Required when macos_signing_identity is set.'
        required: false
      NOTARIZATION_ISSUER_ID:
        description: 'App Store Connect Issuer ID (UUID). Required when macos_signing_identity is set.'
        required: false
      MACOS_PROVISIONING_PROFILE:
        description: 'Base64-encoded `<consumer>.provisionprofile` from developer.apple.com (Profiles → Distribution → Developer ID, bound to the consumer''s App ID and the team''s Developer ID Application certificate). Decoded into `<app_name>.app/Contents/embedded.provisionprofile` so AMFI accepts the binary''s `keychain-access-groups` claim. Required when `macos_bundle_id` is set.'
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    # Native runners for every target — no cross-compile fragility:
    #
    # * Windows targets → windows-latest (x86_64; the aarch64-pc-windows
    #   target cross-compiles from x86_64 here, which the existing
    #   "Build release" step handles).
    # * aarch64 Linux targets → ubuntu-24.04-arm (GitHub-hosted native
    #   ARM64 Linux runner, free for public repos as of early 2025).
    # * Other Linux targets → ubuntu-22.04 (x86_64 native).
    # * macOS targets → macos-latest (arm64 native; the x86_64 target
    #   cross-compiles from arm64 here via Apple's Xcode toolchain).
    runs-on: ${{ contains(matrix.target, 'windows') && 'windows-latest' || ((matrix.target == 'aarch64-unknown-linux-gnu' || matrix.target == 'aarch64-unknown-linux-musl') && 'ubuntu-24.04-arm' || (contains(matrix.target, 'linux') && 'ubuntu-22.04' || 'macos-latest')) }}
    strategy:
      matrix:
        target: ${{ fromJson(inputs.targets) }}
    steps:
      - uses: actions/checkout@v5

      - name: Patch version from tag
        shell: python3 {0}
        run: |
          import os, re, glob

          version = os.environ["GITHUB_REF_NAME"].lstrip("v")
          print(f"Release version: {version}")

          # Patch workspace version in Cargo.toml
          toml = open("Cargo.toml").read()
          toml = re.sub(r'^version = ".*"', f'version = "{version}"', toml, count=1, flags=re.MULTILINE)
          open("Cargo.toml", "w").write(toml)

          # Collect crate names that inherit the workspace version
          crates = set()
          for path in glob.glob("*/Cargo.toml") + glob.glob("**/*/Cargo.toml"):
              content = open(path).read()
              if "version.workspace = true" in content:
                  m = re.search(r'^name = "([^"]+)"', content, re.MULTILINE)
                  if m:
                      crates.add(m.group(1))

          # Patch Cargo.lock: for each crate, find its name line and update the next version line
          if os.path.exists("Cargo.lock") and crates:
              lines = open("Cargo.lock").readlines()
              for i, line in enumerate(lines):
                  for crate in crates:
                      if line.strip() == f'name = "{crate}"' and i + 1 < len(lines):
                          lines[i + 1] = re.sub(r'^version = ".*"', f'version = "{version}"', lines[i + 1])
              open("Cargo.lock", "w").writelines(lines)

          # Verify
          for line in open("Cargo.toml"):
              if line.startswith("version"):
                  print(f"Cargo.toml: {line.strip()}")
                  break

      - name: Clone libenclaveapp
        shell: bash
        run: |
          git clone --depth 1 https://github.com/godaddy/libenclaveapp.git ../libenclaveapp
          cp -r ../libenclaveapp/crates ../crates
          cp ../libenclaveapp/Cargo.toml ../Cargo.toml

      - name: Install system dependencies (Linux glibc)
        if: runner.os == 'Linux' && inputs.linux_deps != '' && !contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y ${{ inputs.linux_deps }}

      - name: Install musl toolchain (Linux musl)
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Set version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Patch Cargo.toml version (Unix)
        if: runner.os != 'Windows'
        run: |
          sed -i '' "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" Cargo.toml 2>/dev/null || \
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" Cargo.toml

      - name: Patch Cargo.toml version (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          (Get-Content Cargo.toml) -replace '^version = ".*"', "version = `"${{ steps.version.outputs.version }}`"" | Set-Content Cargo.toml

      # CI checks (fmt, clippy, test) run on native targets only.
      # Cross-compile targets (arm64 Windows, musl) just build.
      - name: Check formatting
        if: "!contains(matrix.target, 'aarch64-pc-windows') && !contains(matrix.target, 'musl')"
        run: cargo fmt --all -- --check

      - name: Clippy
        if: "!contains(matrix.target, 'aarch64-pc-windows') && !contains(matrix.target, 'musl')"
        run: cargo clippy --workspace ${{ inputs.cargo_build_args }} -- -D warnings

      - name: Build release
        shell: bash
        run: |
          exclude=""
          # On musl/cross-compile targets, exclude cdylib crates (can't produce .so/.dll)
          if [[ "${{ matrix.target }}" == *"musl"* ]] || [[ "${{ matrix.target }}" == "aarch64-pc-windows"* ]]; then
            for toml in */Cargo.toml **/*/Cargo.toml; do
              if grep -q 'crate-type.*cdylib' "$toml" 2>/dev/null; then
                name=$(grep '^name' "$toml" | head -1 | sed 's/.*"\(.*\)".*/\1/')
                [ -n "$name" ] && exclude="$exclude --exclude $name"
              fi
            done
          fi
          cargo build --workspace --release --target ${{ matrix.target }} ${{ inputs.cargo_build_args }} $exclude

      - name: Start D-Bus and gnome-keyring (Linux)
        if: runner.os == 'Linux' && !contains(matrix.target, 'musl')
        run: |
          if command -v gnome-keyring-daemon &>/dev/null; then
            eval $(dbus-launch --sh-syntax)
            echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS" >> "$GITHUB_ENV"
            echo "test" | gnome-keyring-daemon --unlock --components=secrets 2>/dev/null || true
          fi

      - name: Canonicalize TMPDIR (macOS)
        if: runner.os == 'macOS'
        run: echo "TMPDIR=$(python3 -c 'import tempfile, os; print(os.path.realpath(tempfile.gettempdir()))')" >> "$GITHUB_ENV"

      - name: Test
        if: "!contains(matrix.target, 'aarch64-pc-windows') && !contains(matrix.target, 'musl')"
        env:
          # GitHub Actions macOS runners block indefinitely when an
          # unsigned test binary calls SecItemAdd against the login
          # keychain (ACL confirmation prompt can't be answered
          # headlessly). Consumers whose dev-dependencies enable
          # enclaveapp-app-storage's `mock` feature route through
          # MockEncryptionStorage when this var is set. Consumers
          # that don't enable the feature see no effect — the
          # env-var check is #[cfg(feature = "mock")]-gated.
          ENCLAVEAPP_MOCK_STORAGE: ${{ runner.os == 'macOS' && '1' || '' }}
        run: cargo test --workspace ${{ inputs.cargo_build_args }} ${{ inputs.test_args && format('-- {0}', inputs.test_args) || '' }}

      # macOS code signing + notarization. Gated on `macos_signing_identity`
      # being set AND the matching secrets being present, so consumers
      # without an Apple Developer cert keep building unsigned tarballs
      # exactly as before. The keychain is created in $RUNNER_TEMP, torn
      # down at job exit, and never persists across runs.
      - name: Set up signing keychain (macOS)
        id: signing_keychain
        if: runner.os == 'macOS' && inputs.macos_signing_identity != ''
        env:
          P12_BASE64: ${{ secrets.MACOS_SIGNING_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.MACOS_SIGNING_CERTIFICATE_PASSWORD }}
        shell: bash
        run: |
          if [ -z "$P12_BASE64" ] || [ -z "$P12_PASSWORD" ]; then
            echo "::warning::macos_signing_identity is set but MACOS_SIGNING_CERTIFICATE_P12 / _PASSWORD are missing — skipping signing"
            exit 0
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/sign.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          P12_PATH="$RUNNER_TEMP/cert.p12"
          printf '%s' "$P12_BASE64" | base64 -d > "$P12_PATH"
          security import "$P12_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign
          rm -f "$P12_PATH"

          # Prepend our temp keychain to the user search list so codesign
          # finds the imported identity. Preserve the existing search list
          # so the rest of the runner's tooling keeps working.
          existing=$(security list-keychains -d user | sed -e 's/^[[:space:]]*//' -e 's/"//g')
          security list-keychains -d user -s "$KEYCHAIN_PATH" $existing

          # Authorize codesign + apple security tools to use the private key
          # without per-call prompts. -S is the partition list.
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          echo "keychain_path=$KEYCHAIN_PATH" >> "$GITHUB_OUTPUT"

      # Resolve the macOS-specific binary list. When `macos_binaries`
      # is set, it overrides `unix_binaries` for every macOS step
      # below — so consumers can drop binaries that don't make sense
      # on macOS (e.g. tpm-bridge stdio servers) without disturbing
      # Linux. When empty, falls back to `unix_binaries` for
      # bit-for-bit compatibility with the pre-bundling pipeline.
      - name: Resolve macOS binary list
        if: runner.os == 'macOS'
        id: macos_bins
        shell: bash
        run: |
          if [ -n "${{ inputs.macos_binaries }}" ]; then
            echo "list=${{ inputs.macos_binaries }}" >> "$GITHUB_OUTPUT"
          else
            echo "list=${{ inputs.unix_binaries }}" >> "$GITHUB_OUTPUT"
          fi

      # Stage the .app bundle layout when the consumer opts in via
      # `macos_bundle_id`. The provisioning profile is decoded into
      # `Contents/embedded.provisionprofile` so AMFI accepts the
      # binary's `keychain-access-groups` claim — without it,
      # entitled binaries would be SIGKILL-ed at launch with
      # `Restricted entitlements not validated`. See
      # `docs/macos-app-bundle-distribution.md`.
      - name: Stage .app bundle (macOS)
        if: runner.os == 'macOS' && inputs.macos_bundle_id != ''
        id: app_bundle
        shell: bash
        env:
          PROFILE_BASE64: ${{ secrets.MACOS_PROVISIONING_PROFILE }}
          BUNDLE_ID: ${{ inputs.macos_bundle_id }}
          BINARIES: ${{ steps.macos_bins.outputs.list }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ -z "$PROFILE_BASE64" ]; then
            echo "::error::macos_bundle_id is set but MACOS_PROVISIONING_PROFILE secret is missing — bundle would fail AMFI launch"
            exit 1
          fi
          APP="${{ inputs.app_name }}.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS"
          # Stage binaries (executables) into the bundle. Dylibs from
          # `extra_packaging.unix_libs` are deliberately kept OUTSIDE
          # the bundle: Homebrew runs `install_name_tool`-style
          # rewriting on every Mach-O it finds in the keg post-install
          # (including inside `.app/Contents/MacOS/`), which would
          # invalidate the bundle's `_CodeSignature/CodeResources`
          # hashes and make Gatekeeper reject the entire bundle as
          # "damaged." A loose `.dylib` next to the bundle can be
          # rewritten freely without affecting the bundle's signature.
          extra='${{ inputs.extra_packaging }}'
          unix_libs=$(echo "$extra" | python3 -c "import sys,json; print(json.load(sys.stdin).get('unix_libs',''))" 2>/dev/null || echo "")
          for item in $BINARIES; do
            src="target/${{ matrix.target }}/release/${item}"
            if [ -f "$src" ]; then
              cp "$src" "$APP/Contents/MacOS/"
            fi
          done
          # Loose dylibs alongside the bundle. The Homebrew formula
          # generation places these via `lib.install` so they end up
          # in `prefix/lib/` and Mach-O loaders find them via the
          # @rpath / DYLD_LIBRARY_PATH brew sets up.
          for lib in $unix_libs; do
            case "$lib" in *.dylib) ;; *) continue ;; esac
            src="target/${{ matrix.target }}/release/${lib}"
            if [ -f "$src" ]; then
              cp "$src" "$lib"
            fi
          done
          # Info.plist — minimum viable for AMFI + Gatekeeper. The
          # primary executable is the first entry in macos_binaries
          # (matches the `bin.install_symlink` ordering in the
          # generated Homebrew formula).
          PRIMARY=$(echo "$BINARIES" | awk '{print $1}')
          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key><string>${BUNDLE_ID}</string>
              <key>CFBundleName</key><string>${{ inputs.app_name }}</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleExecutable</key><string>${PRIMARY}</string>
              <key>CFBundleShortVersionString</key><string>${VERSION}</string>
              <key>CFBundleVersion</key><string>${VERSION}</string>
              <key>LSMinimumSystemVersion</key><string>11.0</string>
          </dict>
          </plist>
          PLIST
          # The leading-whitespace guard above lets us indent the
          # heredoc for readability; strip it so plutil accepts.
          sed -i '' 's/^          //' "$APP/Contents/Info.plist"
          plutil -lint "$APP/Contents/Info.plist"

          # Decode + drop the provisioning profile.
          printf '%s' "$PROFILE_BASE64" | base64 -d > "$APP/Contents/embedded.provisionprofile"
          chmod 644 "$APP/Contents/embedded.provisionprofile"

          echo "bundle_path=$APP" >> "$GITHUB_OUTPUT"
          echo "primary=$PRIMARY" >> "$GITHUB_OUTPUT"

      - name: Sign release binaries (macOS)
        if: runner.os == 'macOS' && inputs.macos_signing_identity != '' && steps.signing_keychain.outputs.keychain_path != ''
        shell: bash
        env:
          IDENTITY: ${{ inputs.macos_signing_identity }}
          ENTITLEMENTS: ${{ inputs.macos_entitlements_plist }}
          BUNDLE_PATH: ${{ steps.app_bundle.outputs.bundle_path }}
          PRIMARY: ${{ steps.app_bundle.outputs.primary }}
        run: |
          entitlements_arg=()
          if [ -n "$ENTITLEMENTS" ]; then
            if [ -f "$ENTITLEMENTS" ]; then
              entitlements_arg=(--entitlements "$ENTITLEMENTS")
              echo "Using entitlements plist: $ENTITLEMENTS"
            else
              echo "::error::macos_entitlements_plist points to '$ENTITLEMENTS' which does not exist relative to the repo root"
              exit 1
            fi
          fi
          extra='${{ inputs.extra_packaging }}'
          unix_libs=$(echo "$extra" | python3 -c "import sys,json; print(json.load(sys.stdin).get('unix_libs',''))" 2>/dev/null || echo "")

          if [ -n "$BUNDLE_PATH" ]; then
            # .app mode: sign leaves first, then the bundle's primary
            # executable, then the bundle as a whole. Apple deprecated
            # `--deep`; the canonical ordering is "all helpers, then
            # the main executable, then the container".
            #
            # `codesign --sign` on the file matching `CFBundleExecutable`
            # is bundle-aware — it validates the bundle's other components
            # at sign time and refuses if any helper is unsigned. So we
            # MUST sign all non-primary children before touching the
            # primary, regardless of alphabetic order.
            #
            # Per-child verify is deliberately omitted: `codesign --verify`
            # on a child of an .app is also bundle-aware and would trip
            # the same "unsigned subcomponent" failure. The final bundle
            # verify at the bottom of this branch covers every child via
            # `--strict --deep`.
            for f in "$BUNDLE_PATH/Contents/MacOS"/*; do
              [ -f "$f" ] || continue
              base=$(basename "$f")
              if [ "$base" = "$PRIMARY" ]; then
                continue
              fi
              codesign --force --sign "$IDENTITY" \
                --options runtime --timestamp \
                "${entitlements_arg[@]}" \
                "$f"
            done
            primary_path="$BUNDLE_PATH/Contents/MacOS/$PRIMARY"
            if [ -f "$primary_path" ]; then
              codesign --force --sign "$IDENTITY" \
                --options runtime --timestamp \
                "${entitlements_arg[@]}" \
                "$primary_path"
            fi
            codesign --force --sign "$IDENTITY" \
              --options runtime --timestamp \
              "${entitlements_arg[@]}" \
              "$BUNDLE_PATH"
            codesign --verify --strict --deep --verbose=2 "$BUNDLE_PATH"
            # Loose dylibs alongside the bundle — sign each so they
            # pass notarization. Skip --entitlements: a dylib doesn't
            # launch standalone and AMFI never validates entitlements
            # on it; what it needs is hardened-runtime + secure
            # timestamp so notary accepts it.
            for lib in $unix_libs; do
              case "$lib" in *.dylib) ;; *) continue ;; esac
              [ -f "$lib" ] || continue
              codesign --force --sign "$IDENTITY" \
                --options runtime --timestamp \
                "$lib"
              codesign --verify --strict --verbose=2 "$lib"
            done
          else
            # Flat mode: sign each binary in target/<target>/release/.
            BINARIES="${{ steps.macos_bins.outputs.list }}"
            for item in $BINARIES $unix_libs; do
              path="target/${{ matrix.target }}/release/${item}"
              [ -f "$path" ] || continue
              codesign --force --sign "$IDENTITY" \
                --options runtime --timestamp \
                "${entitlements_arg[@]}" \
                "$path"
              codesign --verify --strict --verbose=2 "$path"
            done
          fi

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          BUNDLE_PATH: ${{ steps.app_bundle.outputs.bundle_path }}
        run: |
          if [ "$RUNNER_OS" = "macOS" ] && [ -n "$BUNDLE_PATH" ]; then
            # .app mode: tar the signed bundle alongside any signed
            # loose dylibs and a small VERSION sentinel file at the
            # top level. Two reasons for the sentinel:
            #
            # 1. Without an additional sibling at the top level, the
            #    tarball has only `<app>.app/` as its single top-level
            #    entry; Homebrew auto-cd's into single-top-level
            #    tarballs before running `def install`. That breaks
            #    the formula's `prefix.install "<app>.app"` because
            #    the bundle is no longer in cwd by then.
            # 2. The VERSION file is a self-describing marker if
            #    someone unpacks the tarball by hand.
            #
            # Loose dylibs (`unix_libs.*.dylib`) live alongside the
            # bundle here — see "Stage .app bundle" for why they're
            # not inside it.
            STAGE="$RUNNER_TEMP/macos-tarball-stage"
            rm -rf "$STAGE"
            mkdir -p "$STAGE"
            cp -R "$BUNDLE_PATH" "$STAGE/"
            extra='${{ inputs.extra_packaging }}'
            unix_libs=$(echo "$extra" | python3 -c "import sys,json; print(json.load(sys.stdin).get('unix_libs',''))" 2>/dev/null || echo "")
            for lib in $unix_libs; do
              case "$lib" in *.dylib) ;; *) continue ;; esac
              [ -f "$lib" ] || continue
              cp "$lib" "$STAGE/"
            done
            printf 'sshenc-version: %s\nsshenc-target: %s\n' \
              "${{ steps.version.outputs.version }}" \
              "${{ matrix.target }}" > "$STAGE/VERSION"
            tar czf "${{ inputs.app_name }}-${{ matrix.target }}.tar.gz" -C "$STAGE" .
            rm -rf "$STAGE"
            exit 0
          fi
          mkdir -p dist
          if [ "$RUNNER_OS" = "macOS" ]; then
            BINARIES="${{ steps.macos_bins.outputs.list }}"
          else
            BINARIES="${{ inputs.unix_binaries }}"
          fi
          for bin in $BINARIES; do
            cp "target/${{ matrix.target }}/release/${bin}" dist/
          done
          extra='${{ inputs.extra_packaging }}'
          unix_libs=$(echo "$extra" | python3 -c "import sys,json; print(json.load(sys.stdin).get('unix_libs',''))" 2>/dev/null || echo "")
          for lib in $unix_libs; do
            cp "target/${{ matrix.target }}/release/${lib}" dist/ 2>/dev/null || true
          done
          tar czf "${{ inputs.app_name }}-${{ matrix.target }}.tar.gz" -C dist .

      - name: Notarize binaries (macOS)
        if: runner.os == 'macOS' && inputs.macos_signing_identity != '' && steps.signing_keychain.outputs.keychain_path != ''
        shell: bash
        env:
          API_KEY_BASE64: ${{ secrets.NOTARIZATION_API_KEY }}
          KEY_ID: ${{ secrets.NOTARIZATION_KEY_ID }}
          ISSUER_ID: ${{ secrets.NOTARIZATION_ISSUER_ID }}
          BUNDLE_PATH: ${{ steps.app_bundle.outputs.bundle_path }}
        run: |
          if [ -z "$API_KEY_BASE64" ] || [ -z "$KEY_ID" ] || [ -z "$ISSUER_ID" ]; then
            echo "::warning::NOTARIZATION_* secrets missing — binaries are signed but not notarized"
            exit 0
          fi
          KEY_PATH="$RUNNER_TEMP/notary_key.p8"
          printf '%s' "$API_KEY_BASE64" | base64 -d > "$KEY_PATH"
          chmod 600 "$KEY_PATH"

          if [ -n "$BUNDLE_PATH" ]; then
            # .app mode: zip the bundle plus any loose dylibs alongside
            # it (which are signed separately and need notary tickets
            # of their own). notarytool accepts a .zip with multiple
            # top-level Mach-Os; it processes each independently and
            # returns a single Accepted verdict for the whole upload.
            NOTARY_STAGE="$RUNNER_TEMP/notarize-stage"
            rm -rf "$NOTARY_STAGE"
            mkdir -p "$NOTARY_STAGE"
            cp -R "$BUNDLE_PATH" "$NOTARY_STAGE/"
            extra='${{ inputs.extra_packaging }}'
            unix_libs=$(echo "$extra" | python3 -c "import sys,json; print(json.load(sys.stdin).get('unix_libs',''))" 2>/dev/null || echo "")
            for lib in $unix_libs; do
              case "$lib" in *.dylib) ;; *) continue ;; esac
              [ -f "$lib" ] || continue
              cp "$lib" "$NOTARY_STAGE/"
            done
            NOTARY_ZIP="$RUNNER_TEMP/notarize.zip"
            (cd "$NOTARY_STAGE" && ditto -c -k --sequesterRsrc . "$NOTARY_ZIP")
            rm -rf "$NOTARY_STAGE"
          else
            # Flat mode: zip dist/ as before.
            NOTARY_ZIP="$RUNNER_TEMP/notarize.zip"
            (cd dist && zip -r "$NOTARY_ZIP" .)
          fi

          xcrun notarytool submit "$NOTARY_ZIP" \
            --key "$KEY_PATH" \
            --key-id "$KEY_ID" \
            --issuer "$ISSUER_ID" \
            --wait

          rm -f "$KEY_PATH" "$NOTARY_ZIP"

      - name: Tear down signing keychain (macOS)
        if: always() && runner.os == 'macOS' && steps.signing_keychain.outputs.keychain_path != ''
        shell: bash
        run: |
          security delete-keychain "${{ steps.signing_keychain.outputs.keychain_path }}" || true

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          foreach ($bin in "${{ inputs.windows_binaries }}".Split(" ")) {
            Copy-Item "target/${{ matrix.target }}/release/$bin" dist/
          }
          $extra = '${{ inputs.extra_packaging }}' | ConvertFrom-Json -ErrorAction SilentlyContinue
          if ($extra -and $extra.windows_dlls) {
            foreach ($dll in $extra.windows_dlls.Split(" ")) {
              if ($dll -and (Test-Path "target/${{ matrix.target }}/release/$dll")) {
                Copy-Item "target/${{ matrix.target }}/release/$dll" dist/
              }
            }
          }
          Compress-Archive -Path dist/* -DestinationPath "${{ inputs.app_name }}-${{ matrix.target }}.zip"

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ inputs.app_name }}-${{ matrix.target }}
          path: ${{ inputs.app_name }}-${{ matrix.target }}.*

  msi:
    name: Build MSI
    needs: build
    if: inputs.wix_file != ''
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download Windows artifact
        uses: actions/download-artifact@v5
        with:
          name: ${{ inputs.app_name }}-x86_64-pc-windows-msvc
          path: win-artifact

      - name: Download Linux artifact
        uses: actions/download-artifact@v5
        with:
          name: ${{ inputs.app_name }}-x86_64-unknown-linux-gnu
          path: linux-artifact

      - name: Stage MSI contents
        shell: pwsh
        run: |
          # Extract Windows binaries from zip
          New-Item -ItemType Directory -Force -Path dist
          Expand-Archive "win-artifact/${{ inputs.app_name }}-x86_64-pc-windows-msvc.zip" -DestinationPath dist

          # Extract Linux binary from tarball for WSL bundling
          New-Item -ItemType Directory -Force -Path linux-tmp
          tar xzf "linux-artifact/${{ inputs.app_name }}-x86_64-unknown-linux-gnu.tar.gz" -C linux-tmp
          # Copy the main Linux binary into dist as <app>-linux
          $firstBin = "${{ inputs.unix_binaries }}".Split(" ")[0]
          Copy-Item "linux-tmp/$firstBin" "dist/${{ inputs.app_name }}-linux"

      - name: Build MSI
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.*
          wix build "${{ inputs.wix_file }}" -o "${{ inputs.app_name }}-x86_64-pc-windows-msvc.msi" -bindpath dist

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ inputs.app_name }}-msi
          path: ${{ inputs.app_name }}-x86_64-pc-windows-msvc.msi

  release:
    name: Create Release
    needs: [build, msi]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          files=()
          # Collect all build artifacts
          for f in artifacts/${{ inputs.app_name }}-*/${{ inputs.app_name }}-*.tar.gz \
                   artifacts/${{ inputs.app_name }}-*/${{ inputs.app_name }}-*.zip; do
            [ -f "$f" ] && files+=("$f")
          done
          # Collect MSI if it exists
          for f in artifacts/${{ inputs.app_name }}-msi/${{ inputs.app_name }}-*.msi; do
            [ -f "$f" ] && files+=("$f")
          done
          gh release create "$tag" --title "$tag" --generate-notes "${files[@]}"

  update-packages:
    name: Update Package Managers
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Update Homebrew tap
        if: inputs.homebrew != ''
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          app="${{ inputs.app_name }}"
          bundle_id="${{ inputs.macos_bundle_id }}"

          tap_repo=$(echo '${{ inputs.homebrew }}' | python3 -c "import sys,json; print(json.load(sys.stdin)['tap_repo'])")
          formula_class=$(echo '${{ inputs.homebrew }}' | python3 -c "import sys,json; print(json.load(sys.stdin)['formula_class'])")
          description=$(echo '${{ inputs.homebrew }}' | python3 -c "import sys,json; print(json.load(sys.stdin)['description'])")

          arm_sha=$(sha256sum "artifacts/${app}-aarch64-apple-darwin/${app}-aarch64-apple-darwin.tar.gz" | cut -d' ' -f1)
          intel_sha=$(sha256sum "artifacts/${app}-x86_64-apple-darwin/${app}-x86_64-apple-darwin.tar.gz" | cut -d' ' -f1)

          # Linuxbrew support is opt-in by virtue of the consumer building
          # any Linux gnu artifact. The formula's `on_linux do` block
          # mirrors the macOS structure: `on_arm` and `on_intel` nested
          # blocks, each conditionally emitted based on whether the
          # consumer ships that arch.
          linux_intel_artifact="artifacts/${app}-x86_64-unknown-linux-gnu/${app}-x86_64-unknown-linux-gnu.tar.gz"
          linux_arm_artifact="artifacts/${app}-aarch64-unknown-linux-gnu/${app}-aarch64-unknown-linux-gnu.tar.gz"
          linux_intel_sha=""
          linux_arm_sha=""
          ship_linux_intel=0
          ship_linux_arm=0
          if [ -f "$linux_intel_artifact" ]; then
            linux_intel_sha=$(sha256sum "$linux_intel_artifact" | cut -d' ' -f1)
            ship_linux_intel=1
          fi
          if [ -f "$linux_arm_artifact" ]; then
            linux_arm_sha=$(sha256sum "$linux_arm_artifact" | cut -d' ' -f1)
            ship_linux_arm=1
          fi
          ship_linux=0
          if [ "$ship_linux_intel" = 1 ] || [ "$ship_linux_arm" = 1 ]; then
            ship_linux=1
          fi

          git clone "https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/${tap_repo}.git" /tmp/tap

          # Pick the macOS binary list — falls back to unix_binaries
          # when consumers haven't set macos_binaries explicitly.
          mac_binaries="${{ inputs.macos_binaries }}"
          if [ -z "$mac_binaries" ]; then
            mac_binaries="${{ inputs.unix_binaries }}"
          fi

          # macOS install lines (run inside `if OS.mac?` block of the
          # Ruby formula, so each line is indented one extra level
          # relative to a top-level `def install`).
          mac_install_lines=""
          extra='${{ inputs.extra_packaging }}'
          unix_libs=$(echo "$extra" | python3 -c "import sys,json; print(json.load(sys.stdin).get('unix_libs',''))" 2>/dev/null || echo "")
          if [ -n "$bundle_id" ]; then
            mac_install_lines="${mac_install_lines}      prefix.install \"${app}.app\"\n"
            for bin in $mac_binaries; do
              mac_install_lines="${mac_install_lines}      bin.install_symlink prefix/\"${app}.app/Contents/MacOS/${bin}\" => \"${bin}\"\n"
            done
            # Loose dylibs alongside the bundle — Homebrew rewrites
            # rpath / install names on these (which is the whole
            # reason they live OUTSIDE the bundle; see "Stage .app
            # bundle" earlier in this workflow). They land in
            # `prefix/lib/` and get the standard Homebrew shim path.
            for lib in $unix_libs; do
              case "$lib" in *.dylib) ;; *) continue ;; esac
              mac_install_lines="${mac_install_lines}      lib.install \"${lib}\"\n"
            done
          else
            for bin in $mac_binaries; do
              mac_install_lines="${mac_install_lines}      bin.install \"${bin}\"\n"
            done
            for lib in $unix_libs; do
              case "$lib" in *.so) continue ;; esac
              mac_install_lines="${mac_install_lines}      lib.install \"${lib}\"\n"
            done
          fi

          # Linux install lines — installs the full `unix_binaries` set
          # (Linux ships every binary, including stdio bridges that
          # macOS skips) plus any `unix_libs` `.so` files.
          linux_install_lines=""
          for bin in ${{ inputs.unix_binaries }}; do
            linux_install_lines="${linux_install_lines}      bin.install \"${bin}\"\n"
          done
          for lib in $unix_libs; do
            case "$lib" in *.dylib) continue ;; esac
            linux_install_lines="${linux_install_lines}      lib.install \"${lib}\"\n"
          done

          # Build the on_linux URL block (or empty string when the
          # consumer ships no Linux artifact). When both arches ship
          # we mirror the macOS pattern with nested on_arm/on_intel;
          # when only one ships, we emit a flat block to avoid a
          # half-empty container.
          linux_url_block=""
          if [ "$ship_linux_intel" = 1 ] && [ "$ship_linux_arm" = 1 ]; then
            linux_url_block=$(printf '\n  on_linux do\n    on_arm do\n      url "https://github.com/godaddy/%s/releases/download/%s/%s-aarch64-unknown-linux-gnu.tar.gz"\n      sha256 "%s"\n    end\n\n    on_intel do\n      url "https://github.com/godaddy/%s/releases/download/%s/%s-x86_64-unknown-linux-gnu.tar.gz"\n      sha256 "%s"\n    end\n  end\n' "$app" "$tag" "$app" "$linux_arm_sha" "$app" "$tag" "$app" "$linux_intel_sha")
          elif [ "$ship_linux_intel" = 1 ]; then
            linux_url_block=$(printf '\n  on_linux do\n    url "https://github.com/godaddy/%s/releases/download/%s/%s-x86_64-unknown-linux-gnu.tar.gz"\n    sha256 "%s"\n  end\n' "$app" "$tag" "$app" "$linux_intel_sha")
          elif [ "$ship_linux_arm" = 1 ]; then
            linux_url_block=$(printf '\n  on_linux do\n    url "https://github.com/godaddy/%s/releases/download/%s/%s-aarch64-unknown-linux-gnu.tar.gz"\n    sha256 "%s"\n  end\n' "$app" "$tag" "$app" "$linux_arm_sha")
          fi

          # Heredoc with leading-whitespace stripped by sed at the end.
          # The `if OS.mac? ... else ... end` branch in the install
          # method works as long as both arms have at least one
          # statement. When ship_linux=0 the else arm is dead but
          # still needs to be syntactically valid Ruby.
          if [ "$ship_linux" = 1 ]; then
            install_body=$(printf '    if OS.mac?\n%s    else\n%s    end' "$mac_install_lines" "$linux_install_lines")
          else
            install_body=$(printf '%s' "$mac_install_lines" | sed 's/^      /    /')
          fi

          cat > /tmp/tap/Formula/${app}.rb << FORMULA
          class ${formula_class} < Formula
            desc "${description}"
            homepage "https://github.com/godaddy/${app}"
            version "${version}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/godaddy/${app}/releases/download/${tag}/${app}-aarch64-apple-darwin.tar.gz"
                sha256 "${arm_sha}"
              end

              on_intel do
                url "https://github.com/godaddy/${app}/releases/download/${tag}/${app}-x86_64-apple-darwin.tar.gz"
                sha256 "${intel_sha}"
              end
            end${linux_url_block}

            def install
          $(echo -e "${install_body}")
            end

            def post_install
              # Restart a running LaunchAgent-managed daemon so users pick up the
              # new binary immediately after `brew upgrade`. `kickstart -k` kills
              # and relaunches the service; with KeepAlive=true launchd always
              # restarts it. Explicitly targets the gui/<uid> bootstrap domain so
              # this works when brew runs in a background auto-updater context
              # (which lacks the default user session domain that plain
              # `launchctl stop` targets). No-op if the LaunchAgent has not been
              # installed yet.
              plist = "\#{Dir.home}/Library/LaunchAgents/com.godaddy.\#{name}.agent.plist"
              if File.exist?(plist)
                uid = Process.uid.to_s
                system "launchctl", "kickstart", "-k", "gui/\#{uid}/com.godaddy.\#{name}.agent"
              end
            end

            test do
              assert_match "${app}", shell_output("\#{bin}/${app} --help 2>&1", 2)
            end
          end
          FORMULA
          sed -i 's/^          //' /tmp/tap/Formula/${app}.rb

          # Sanity-check the generated Ruby parses before we push it.
          if command -v ruby >/dev/null 2>&1; then
            ruby -c /tmp/tap/Formula/${app}.rb
          fi

          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update ${app} to ${tag}"
          git push

      - name: Update Scoop bucket
        if: inputs.scoop != ''
        env:
          APP: ${{ inputs.app_name }}
          WINDOWS_BINARIES: ${{ inputs.windows_binaries }}
          SCOOP_CFG: ${{ inputs.scoop }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"

          bucket_repo=$(echo "$SCOOP_CFG" | python3 -c "import sys,json; print(json.load(sys.stdin)['bucket_repo'])")
          win_sha=$(sha256sum "artifacts/${APP}-x86_64-pc-windows-msvc/${APP}-x86_64-pc-windows-msvc.zip" | cut -d' ' -f1)

          git clone "https://x-access-token:${{ secrets.SCOOP_BUCKET_TOKEN }}@github.com/${bucket_repo}.git" /tmp/bucket

          TAG="$tag" VERSION="$version" WIN_SHA="$win_sha" python3 <<'PY' > "/tmp/bucket/bucket/${APP}.json"
          import json, os

          scoop_cfg = json.loads(os.environ["SCOOP_CFG"])
          windows_binaries = os.environ["WINDOWS_BINARIES"].split()
          app = os.environ["APP"]

          manifest = {
              "version": os.environ["VERSION"],
              "description": scoop_cfg["description"],
              "homepage": f"https://github.com/godaddy/{app}",
              "license": "MIT",
              "architecture": {
                  "64bit": {
                      "url": f"https://github.com/godaddy/{app}/releases/download/{os.environ['TAG']}/{app}-x86_64-pc-windows-msvc.zip",
                      "hash": os.environ["WIN_SHA"],
                  }
              },
              "bin": windows_binaries,
          }

          # Optionally sync `<app>-tpm-bridge.exe` to `C:\ProgramData\<app>\`
          # on install. WSL Linux callers auto-discover the bridge among
          # admin-install paths only — `Program Files` and `ProgramData` —
          # and intentionally exclude user-writable scoop directories
          # (security: a writable PATH-like override would let a WSL-side
          # attacker swap bridges). Without this hop, `scoop update`
          # silently leaves a stale bridge under ProgramData and the WSL
          # agent keeps using the old version, which manifests as
          # "signing not initialized" / readiness timeouts on startup.
          if scoop_cfg.get("bridge_to_programdata"):
              bridge_name = f"{app}-tpm-bridge.exe"
              if bridge_name in windows_binaries:
                  env_var = f"{app.upper().replace('-', '_')}_BRIDGE_PATH"
                  agent_name = f"{app}-agent"
                  manifest["post_install"] = [
                      f'$pd = Join-Path $env:ProgramData "{app}"',
                      'if (-not (Test-Path $pd)) { New-Item -ItemType Directory -Path $pd -Force | Out-Null }',
                      (
                          f'try {{ Copy-Item (Join-Path $dir "{bridge_name}") '
                          f'-Destination (Join-Path $pd "{bridge_name}") -Force -ErrorAction Stop; '
                          f'Write-Host "{app}: bridge synced to $pd" }} '
                          f'catch {{ Write-Warning "{app}: failed to copy bridge to $pd ($_); '
                          f'WSL callers may pick up a stale bridge. If in use, stop '
                          f'{agent_name} first (Stop-Process -Name {agent_name} on '
                          f'Windows, pkill {agent_name} in WSL). If permission denied, '
                          f're-run scoop from an elevated shell, or set {env_var} '
                          f'to the scoop path." }}'
                      ),
                  ]

          print(json.dumps(manifest, indent=4))
          PY

          cd /tmp/bucket
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update ${APP} to ${tag}"
          git push

      - name: Generate winget manifest
        if: inputs.scoop != ''
        run: |
          has_winget=$(echo '${{ inputs.scoop }}' | python3 -c "import sys,json; print(json.load(sys.stdin).get('has_winget',False))" 2>/dev/null || echo "False")
          [ "$has_winget" = "True" ] || exit 0

          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          app="${{ inputs.app_name }}"
          msi_sha=$(sha256sum "artifacts/${app}-msi/${app}-x86_64-pc-windows-msvc.msi" 2>/dev/null | cut -d' ' -f1 | tr 'a-f' 'A-F')

          mkdir -p /tmp/winget
          for f in winget/*.yaml; do
            [ -f "$f" ] || continue
            sed -e "s/PackageVersion: .*/PackageVersion: ${version}/" \
                -e "s|InstallerUrl: .*|InstallerUrl: https://github.com/godaddy/${app}/releases/download/${tag}/${app}-x86_64-pc-windows-msvc.msi|" \
                -e "s/InstallerSha256: .*/InstallerSha256: ${msi_sha}/" \
                -e "s|ReleaseNotesUrl: .*|ReleaseNotesUrl: https://github.com/godaddy/${app}/releases/tag/${tag}|" \
              "$f" > "/tmp/winget/$(basename "$f")"
          done

      - name: Upload winget manifest
        if: inputs.scoop != ''
        uses: actions/upload-artifact@v5
        with:
          name: winget-manifest
          path: /tmp/winget/
          if-no-files-found: ignore
