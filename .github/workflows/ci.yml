name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check / Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: macOS
            os: macos-latest
            features: "--features enclaveapp-apple/signing,enclaveapp-apple/encryption,enclaveapp-software/signing,enclaveapp-software/encryption"
          - name: Windows
            os: windows-latest
            features: "--features enclaveapp-windows/signing,enclaveapp-windows/encryption,enclaveapp-software/signing,enclaveapp-software/encryption"
          - name: Linux
            os: ubuntu-latest
            features: "--features enclaveapp-software/signing,enclaveapp-software/encryption"
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets ${{ matrix.features }} -- -D warnings

      - name: Build
        run: cargo build --workspace ${{ matrix.features }}

      - name: Test
        run: cargo test --workspace ${{ matrix.features }}
